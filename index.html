<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SintonizAI - Master Agent</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--panel); text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 2px solid var(--accent); }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: #000; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid #334155; }
        .controls { padding: 20px; background: var(--panel); display: flex; flex-direction: column; gap: 10px; }
        input, select, button { padding: 12px; border-radius: 8px; border: none; font-size: 1rem; }
        input, select { background: #334155; color: white; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .api-setup { font-size: 0.8rem; display: flex; gap: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>SintonizAI Master Agent</header>
    
    <div id="auth" class="controls">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar / Registrar</button>
    </div>

    <div id="app" class="chat-container hidden"></div>

    <div id="input-area" class="controls hidden">
        <div class="api-setup">
            <select id="model">
                <option value="master">Aria Ultra (Modo Master)</option>
                <option value="gemini">Gemini Pro</option>
                <option value="groq">Groq (Llama 3)</option>
            </select>
            <input type="text" id="apiKey" placeholder="Sua Chave (Vazio = Usar Master)">
        </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="prompt" style="flex:1" placeholder="Diga algo, Gustavo...">
            <button onclick="send()">Enviar</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('app');
        const inputArea = document.getElementById('input-area');
        const auth = document.getElementById('auth');
        let user = null;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            // Tenta registrar primeiro, se falhar tenta login
            await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: 'Gustavo', email, password})
            });
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            if (data.success) {
                user = data;
                auth.classList.add('hidden');
                chat.classList.remove('hidden');
                inputArea.classList.remove('hidden');
                append('AI', 'Olá Gustavo! Estou online e pronto para agir. O que vamos construir hoje?');
            }
        }

        async function send() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model').value;
            const apiKey = document.getElementById('apiKey').value;
            if (!prompt) return;

            append('Você', prompt);
            document.getElementById('prompt').value = '';

            const res = await fetch('/api/agent/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: prompt, model, apiKey})
            });
            const data = await res.json();
            append('AI', data.response);
        }

        function append(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender === 'Você' ? 'user' : 'ai'}`;
            div.innerHTML = `<strong>${sender}:</strong><br>${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
